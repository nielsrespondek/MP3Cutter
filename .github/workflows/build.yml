name: Build Windows exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: HookCutter.exe bauen
        run: pyinstaller hookcutter.spec

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: HookCutter-Windows
          path: dist/HookCutter.exe

      - name: GitHub Release erstellen (nur bei Tag-Push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HookCutter.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
