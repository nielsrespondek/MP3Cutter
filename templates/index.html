<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hook-Cutter</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1e2127;
    --accent: #4ade80;
    --accent-dark: #22c55e;
    --text: #e8e8ea;
    --text-dim: #8a8f98;
    --border: #2c303a;
    --danger: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 320px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  #sidebar h1 {
    font-size: 16px;
    padding: 16px;
    margin: 0;
    border-bottom: 1px solid var(--border);
  }
  #progress {
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  #filelist {
    overflow-y: auto;
    flex: 1;
  }
  .file-item {
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .file-item:hover { background: #262a32; }
  .file-item.active { background: #2a3f2f; }
  .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .file-status { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
  .file-status.done { color: var(--accent); }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 24px;
  }
  #songname {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    word-break: break-word;
    max-width: 700px;
  }
  #timecode {
    font-size: 48px;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: var(--accent);
  }
  #duration { font-size: 14px; color: var(--text-dim); }

  #seek-wrap {
    position: relative;
    width: 480px;
    max-width: 90vw;
  }
  #seekbar {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(
      to right,
      var(--accent) 0%,
      var(--accent) var(--progress, 0%),
      var(--border) var(--progress, 0%),
      var(--border) 100%
    );
    outline: none;
    cursor: pointer;
    margin: 0;
  }
  #seekbar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.18);
    margin-top: 0;
  }
  #seekbar::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
    box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.18);
  }
  #seekbar::-moz-range-track {
    height: 6px;
    border-radius: 3px;
    background: transparent;
  }
  #cut-marker {
    position: absolute;
    top: -5px;
    width: 2px;
    height: 16px;
    background: var(--danger);
    pointer-events: none;
    transform: translateX(-1px);
    display: none;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  #mode-switch {
    display: flex;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
  }
  #mode-switch button {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    background: transparent;
    color: var(--text-dim);
    border-radius: 7px;
  }
  #mode-switch button.active {
    background: var(--accent);
    color: #0a1a0f;
  }
  #mode-switch button:not(.active):hover {
    color: var(--text);
    background: #262a32;
  }
  button {
    font-family: inherit;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.05s ease, background 0.15s ease;
  }
  button:active { transform: scale(0.96); }
  .btn-round {
    width: 52px;
    height: 52px;
    font-size: 20px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-round:hover { background: #262a32; }
  #markbtn {
    padding: 20px 48px;
    font-size: 20px;
    font-weight: 700;
    background: var(--accent);
    color: #0a1a0f;
  }
  #markbtn:hover { background: var(--accent-dark); }
  #skipbtn {
    padding: 12px 20px;
    font-size: 14px;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  #skipbtn:hover { color: var(--text); border-color: var(--text-dim); }
  .hint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    max-width: 500px;
  }
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0a1a0f;
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--danger); }
  .reset-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
  }
  #empty-state {
    text-align: center;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div id="sidebar">
  <h1>🎧 Hook-Cutter</h1>
  <div id="progress">lädt...</div>
  <div id="filelist"></div>
</div>

<div id="main">
  <div id="mode-switch">
    <button id="mode-from" class="active" title="Alles VOR der Markierung wegschneiden">✂️ Intro wegschneiden</button>
    <button id="mode-to" title="Alles NACH der Markierung wegschneiden">✂️ Hook wegschneiden</button>
  </div>

  <div id="songname">lädt...</div>
  <div id="timecode">00:00.0</div>
  <div id="duration"></div>

  <div id="seek-wrap">
    <input type="range" id="seekbar" min="0" max="100" value="0" step="0.01">
    <div id="cut-marker"></div>
  </div>

  <div class="controls">
    <button class="btn-round" id="prevbtn" title="Vorheriger Song">⏮</button>
    <button class="btn-round" id="backbtn" title="-5s">−5</button>
    <button class="btn-round" id="playbtn" title="Play/Pause (Leertaste)">▶</button>
    <button class="btn-round" id="fwdbtn" title="+5s">+5</button>
    <button class="btn-round" id="nextbtn" title="Nächster Song">⏭</button>
  </div>

  <button id="markbtn">✂️ Hier ist der Hook!</button>
  <button id="skipbtn">Ohne Schnitt übernehmen (kein Intro vorhanden)</button>

  <div class="hint">
    <b>Leertaste</b> = Play/Pause · <b>Enter</b> = Hier schneiden ·
    <b>← →</b> = ±5s · <b>↑ ↓</b> = ±1s · <b>N</b> = nächster Song ·
    <b>T</b> = Modus wechseln
  </div>

  <audio id="player"></audio>
</div>

<div id="toast"></div>

<script>
let files = [];
let currentIndex = 0;
let isSeeking = false;
let cutMode = "from"; // "from" = Intro wegschneiden (ab hier behalten), "to" = Hook wegschneiden (bis hier behalten)
const player = document.getElementById("player");
const songname = document.getElementById("songname");
const timecode = document.getElementById("timecode");
const duration = document.getElementById("duration");
const playbtn = document.getElementById("playbtn");
const progress = document.getElementById("progress");
const filelist = document.getElementById("filelist");
const seekbar = document.getElementById("seekbar");
const cutMarker = document.getElementById("cut-marker");
const markbtn = document.getElementById("markbtn");
const modeFromBtn = document.getElementById("mode-from");
const modeToBtn = document.getElementById("mode-to");

function setMode(mode) {
  cutMode = mode;
  modeFromBtn.classList.toggle("active", mode === "from");
  modeToBtn.classList.toggle("active", mode === "to");
  markbtn.textContent = mode === "from"
    ? "✂️ Hier ist der Hook!"
    : "✂️ Hier endet das Intro!";
}
modeFromBtn.onclick = () => setMode("from");
modeToBtn.onclick = () => setMode("to");

function updateSeekbarFill() {
  const max = parseFloat(seekbar.max) || 0;
  const pct = max > 0 ? (seekbar.value / max) * 100 : 0;
  seekbar.style.setProperty("--progress", pct + "%");
}

function updateCutMarker(f) {
  if (f && f.cut_at !== null && player.duration) {
    const pct = (f.cut_at / player.duration) * 100;
    cutMarker.style.left = pct + "%";
    cutMarker.style.display = "block";
  } else {
    cutMarker.style.display = "none";
  }
}

function fmt(t) {
  const m = Math.floor(t / 60);
  const s = (t % 60).toFixed(1).padStart(4, "0");
  return `${String(m).padStart(2, "0")}:${s}`;
}

async function loadFiles() {
  const res = await fetch("/api/files");
  files = await res.json();
  renderList();
  if (files.length > 0) {
    const firstOpen = files.findIndex(f => f.cut_at === null && !f.skipped);
    loadSong(firstOpen >= 0 ? firstOpen : 0);
  } else {
    songname.textContent = "Keine MP3-Dateien im Input-Ordner gefunden.";
  }
}

function renderList() {
  const doneCount = files.filter(f => f.cut_at !== null || f.skipped).length;
  progress.textContent = `${doneCount} / ${files.length} erledigt`;

  filelist.innerHTML = "";
  files.forEach((f, i) => {
    const div = document.createElement("div");
    div.className = "file-item" + (i === currentIndex ? " active" : "");
    const isDone = f.cut_at !== null || f.skipped;
    div.innerHTML = `
      <span class="file-name">${f.name}</span>
      <span class="file-status ${isDone ? 'done' : ''}">
        ${f.skipped ? '➡️ übernommen' : (f.cut_at !== null ? '✅ ' + (f.mode === 'to' ? 'bis ' : 'ab ') + fmt(f.cut_at) : '')}
      </span>
    `;
    div.onclick = () => loadSong(i);
    filelist.appendChild(div);
  });
}

function loadSong(i) {
  if (i < 0 || i >= files.length) return;
  currentIndex = i;
  const f = files[i];
  songname.textContent = f.name;
  player.src = "/audio/" + encodeURIComponent(f.name);
  player.currentTime = 0;
  timecode.textContent = "00:00.0";
  duration.textContent = "";
  seekbar.value = 0;
  seekbar.max = 100;
  updateSeekbarFill();
  cutMarker.style.display = "none";
  renderList();
  player.play().catch(() => {});
}

player.addEventListener("timeupdate", () => {
  timecode.textContent = fmt(player.currentTime);
  if (!isSeeking) {
    seekbar.value = player.currentTime;
    updateSeekbarFill();
  }
});
player.addEventListener("loadedmetadata", () => {
  duration.textContent = "Gesamtlänge: " + fmt(player.duration);
  seekbar.max = player.duration;
  seekbar.value = player.currentTime;
  updateSeekbarFill();
  updateCutMarker(files[currentIndex]);
});
player.addEventListener("play", () => playbtn.textContent = "⏸");
player.addEventListener("pause", () => playbtn.textContent = "▶");
player.addEventListener("ended", () => {
  goNext();
});

seekbar.addEventListener("input", () => {
  isSeeking = true;
  player.currentTime = parseFloat(seekbar.value);
  timecode.textContent = fmt(player.currentTime);
  updateSeekbarFill();
});
seekbar.addEventListener("change", () => {
  isSeeking = false;
});

function togglePlay() {
  if (player.paused) player.play(); else player.pause();
}

function seek(delta) {
  player.currentTime = Math.max(0, player.currentTime + delta);
}

function goNext() {
  if (currentIndex < files.length - 1) loadSong(currentIndex + 1);
}
function goPrev() {
  if (currentIndex > 0) loadSong(currentIndex - 1);
}

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = isError ? "show error" : "show";
  setTimeout(() => { t.className = t.className.replace("show", ""); }, 1800);
}

async function markHook() {
  const f = files[currentIndex];
  const seconds = player.currentTime;
  const mode = cutMode;
  player.pause();
  markbtn.disabled = true;
  try {
    const res = await fetch("/api/cut", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename: f.name, seconds, mode }),
    });
    const data = await res.json();
    if (data.ok) {
      f.cut_at = data.seconds;
      f.mode = data.mode;
      f.skipped = false;
      showToast(`Geschnitten (${mode === 'to' ? 'bis' : 'ab'} ${fmt(data.seconds)})`);
      renderList();
      updateCutMarker(f);
      setTimeout(goNext, 500);
    } else {
      showToast("Fehler: " + data.error, true);
    }
  } catch (e) {
    showToast("Fehler: " + e, true);
  } finally {
    markbtn.disabled = false;
  }
}

async function skipSong() {
  const f = files[currentIndex];
  const res = await fetch("/api/skip", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ filename: f.name }),
  });
  const data = await res.json();
  if (data.ok) {
    f.skipped = true;
    f.cut_at = null;
    showToast("Ohne Schnitt übernommen");
    renderList();
    setTimeout(goNext, 300);
  } else {
    showToast("Fehler: " + data.error, true);
  }
}

document.getElementById("markbtn").onclick = markHook;
document.getElementById("skipbtn").onclick = skipSong;
document.getElementById("playbtn").onclick = togglePlay;
document.getElementById("nextbtn").onclick = goNext;
document.getElementById("prevbtn").onclick = goPrev;
document.getElementById("backbtn").onclick = () => seek(-5);
document.getElementById("fwdbtn").onclick = () => seek(5);

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  switch (e.key) {
    case " ":
      e.preventDefault();
      togglePlay();
      break;
    case "Enter":
      e.preventDefault();
      markHook();
      break;
    case "ArrowLeft":
      e.preventDefault();
      seek(-5);
      break;
    case "ArrowRight":
      e.preventDefault();
      seek(5);
      break;
    case "ArrowUp":
      e.preventDefault();
      seek(1);
      break;
    case "ArrowDown":
      e.preventDefault();
      seek(-1);
      break;
    case "n":
    case "N":
      goNext();
      break;
    case "t":
    case "T":
      setMode(cutMode === "from" ? "to" : "from");
      break;
  }
});

loadFiles();
</script>

</body>
</html>
